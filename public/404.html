<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Wylify</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        body {
            background-color: #0A0A0A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border-left: 2px solid #CC0000;
            background-color: #0F0F0F;
            max-width: 400px;
        }
        h1 {
            font-size: 5rem;
            margin: 0;
            opacity: 0.1;
            letter-spacing: -3px;
        }
        h2 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: -2rem;
            margin-bottom: 1rem;
        }
        p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background-color: #CC0000;
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        a:hover {
            background-color: white;
            color: black;
        }
        .grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(128, 128, 128, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(128, 128, 128, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="container">
        <h1>404</h1>
        <h2>NOT FOUND</h2>
        <p>You have drifted into the obsidian void. The coordinates you provided do not exist in this archive.</p>
        <a href="/">RETURN TO SITE</a>
    </div>

    <!-- Optional: Auto-redirect to home if they land here which helps with GitHub Pages SPAs -->
    <script>
        // If someone lands here, we could try to redirect to the home page
        // so that the HashRouter can handle things if they were trying to deep link
        // but for now, we just give them a clear manual button.
    </script>
</body>
</html>
