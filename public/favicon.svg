<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded corner square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0D0D0D" />
  
  <!-- Subtle texture effect (noise) -->
  <filter id="noiseFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
    <feColorMatrix type="saturate" values="0" />
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.1" />
    </feComponentTransfer>
    <feBlend in="SourceGraphic" in2="noiseFilter" mode="overlay" />
  </filter>
  <rect width="512" height="512" rx="112" ry="112" fill="#FFFFFF" fill-opacity="0.03" filter="url(#noiseFilter)" pointer-events="none" />

  <!-- Stylized 'W' path - approximating a brush stroke look -->
  <path d="M130 160 Q160 420 190 410 Q220 400 256 240 Q290 400 322 410 Q354 420 382 160" 
        fill="none" 
        stroke="white" 
        stroke-width="54" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#noiseFilter)" />
</svg>
